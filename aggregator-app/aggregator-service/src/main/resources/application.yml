server:
  port: 0  # Random port on each startup (subject requirement); resolved via Eureka by name
spring:
  application:
    name: aggregator-service
eureka:
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka  # Docker service name
  instance:
    # Unique id per instance so random-port instances never collide in the registry
    instance-id: ${spring.application.name}:${random.uuid}