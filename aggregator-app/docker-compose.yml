services:
  # Eureka Server - Service Discovery (fixed standard port 8761)
  eureka-service:
    build:
      context: .
      dockerfile: eureka-service/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: always

  # Countries Service - random internal port, no published port (reached via Eureka by name)
  countries-service:
    build:
      context: .
      dockerfile: countries-service/Dockerfile
    networks:
      - app-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
    depends_on:
      eureka-service:
        condition: service_healthy
    restart: always

  # Covid Service - random internal port, no published port (reached via Eureka by name)
  covid-service:
    build:
      context: .
      dockerfile: covid-service/Dockerfile
    networks:
      - app-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
    depends_on:
      eureka-service:
        condition: service_healthy
    restart: always

  # Aggregator Service - random internal port, no published port (reached via Eureka by name)
  aggregator-service:
    build:
      context: .
      dockerfile: aggregator-service/Dockerfile
    networks:
      - app-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
    depends_on:
      eureka-service:
        condition: service_healthy
      countries-service:
        condition: service_started
      covid-service:
        condition: service_started
    restart: always

  # API Gateway - single public entry point on port 80
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "80:80"
    networks:
      - app-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
    depends_on:
      eureka-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: always

networks:
  app-network:
    driver: bridge
